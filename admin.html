<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can Levi — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:   #1a1a1a;
      --accent:  #c9b89a;
      --bg:      #f7f6f4;
      --surface: #ffffff;
      --border:  #e5e3df;
      --text:    #1a1a1a;
      --muted:   #6b6b6b;
      --danger:  #c0392b;
      --quiz-bg: #eef4fb;
      --quiz-fg: #2563a8;
      --wheel-bg:#fdf3e7;
      --wheel-fg:#b45309;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-view {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }

    .login-logo {
      font-size: 11px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 32px;
      color: var(--brand);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .field input {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      background: var(--surface);
    }

    .field input:focus { border-color: var(--accent); }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 12px;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s;
    }

    .btn-login:hover { opacity: .85; }
    .btn-login:disabled { opacity: .5; cursor: default; }

    /* ── DASHBOARD ── */
    #dash-view { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-left p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-top: 2px;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      transition: all .2s;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    main {
      padding: 28px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    thead tr {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      white-space: nowrap;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr.odd { background: var(--bg); }
    tr.even { background: var(--surface); }
    tr:hover td { background: #f0ede8 !important; }

    td.name { font-weight: 500; }

    td.email a {
      color: var(--muted);
      text-decoration: none;
    }
    td.email a:hover { color: var(--brand); text-decoration: underline; }

    td.date { color: var(--muted); white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-quiz  { background: var(--quiz-bg);  color: var(--quiz-fg); }
    .badge-wheel { background: var(--wheel-bg); color: var(--wheel-fg); }

    .btn-detail {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-detail:hover { border-color: var(--accent); color: var(--brand); }

    td.empty, td.loading {
      text-align: center;
      color: var(--muted);
      padding: 40px;
      font-size: 15px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }

    .modal-box {
      background: var(--surface);
      border-radius: 10px;
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 4px;
      transition: color .2s;
    }
    .btn-close:hover { color: var(--brand); }

    .modal-body {
      padding: 20px 24px 28px;
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section:last-child { margin-bottom: 0; }

    .detail-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .detail-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      align-items: baseline;
    }

    .detail-key {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      width: 90px;
      flex-shrink: 0;
    }

    .detail-val {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      white-space: pre-line;
    }

    .detail-val a {
      color: var(--brand);
    }

    .copy-btn {
      font-size: 11px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      color: var(--muted);
      margin-left: 8px;
      vertical-align: middle;
      transition: all .2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--brand); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .stats { flex-wrap: wrap; gap: 12px; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">Can Levi</div>
      <h1 class="login-title">Admin Paneli</h1>
      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="login-password">Şifre</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn-login" id="login-btn">Giriş Yap</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash-view">
    <header>
      <div class="header-left">
        <h1>Talepler</h1>
        <p id="header-sub">Yükleniyor...</p>
      </div>
      <div class="header-right">
        <div class="stats" id="stats"></div>
        <button class="btn-logout" id="logout-btn">Çıkış</button>
      </div>
    </header>
    <main>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>İsim</th>
              <th>Email</th>
              <th>Tarih</th>
              <th>Kaynak</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="submissions-tbody">
            <tr><td colspan="5" class="loading">Yükleniyor...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Detay</h2>
        <button class="btn-close" id="modal-close" aria-label="Kapat">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
